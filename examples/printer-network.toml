[rendering]
default_profile = "receipt42"

[runtime]
catchup_seconds = 60
poll_interval_seconds = 30

[delivery]
default_adapter = "stdout"

[delivery.file]
output_dir = "var/out"

[printing]
default_target = "receipt_printer"

[[printer_targets]]
target_id = "receipt_printer"
kind = "escpos_socket"
host = "127.0.0.1"
port = 19100
timeout_seconds = 5.0
mode = "raster"
profile = "receipt42"
font_path = ""
font_size = 18
line_spacing = 4
cut = true

[[printer_targets]]
target_id = "bytes_debug"
kind = "escpos_bytes_file"
output_dir = "var/escpos"
mode = "raster"
profile = "receipt42"
font_path = ""
font_size = 18
line_spacing = 4
cut = true

[[publication_slots]]
slot_id = "noon"
name = "Noon"
publish_time = "12:00"
is_enabled = true
recurrence_rule = "daily"

[[scene_apps]]
app_id = "lunch"
name = "Lunch"
target_publication_slot_id = "noon"
scene_note = "Eat well"
checklist_items = ["Vegetables", "Train", "Stop at 21:00"]
is_enabled = true
