[rendering]
default_profile = "receipt42"

[runtime]
catchup_seconds = 60
poll_interval_seconds = 30

[delivery]
default_adapter = "stdout"

[delivery.file]
output_dir = "var/out"

[printing]
default_target = "bytes_debug"

[[printer_targets]]
target_id = "bytes_debug"
kind = "escpos_bytes_file"
output_dir = "var/escpos"
printer_profile = "generic_58mm"
render_profile = "receipt32"
mode = "raster"
font_path = ""
font_size = 18
line_spacing = 4
cut = true
feed_lines = 4

[[publication_slots]]
slot_id = "noon"
name = "Noon"
publish_time = "12:00"
is_enabled = true
recurrence_rule = "daily"

[[scene_apps]]
app_id = "lunch"
name = "Lunch"
target_publication_slot_id = "noon"
scene_note = "Eat vegetables"
checklist_items = ["Walk", "Stretch"]
is_enabled = true
